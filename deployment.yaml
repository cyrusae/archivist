---
apiVersion: v1
kind: Namespace
metadata:
  name: archivist

---
# NOTE: the `archivist-secrets` Secret must exist in the `archivist` namespace
# before this manifest is applied. Do NOT commit a secret manifest to git — see
# DEPLOYMENT.md § "Secrets" for the recommended `kubectl create secret` or
# SealedSecret workflow. A template is in `secrets.example.yaml` for reference.
---
# PostgreSQL for Archivist
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: archivist
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: archivist-postgres
  template:
    metadata:
      labels:
        app: archivist-postgres
    spec:
      containers:
        - name: postgres
          # Upstream `postgres:*` images don't ship pgvector; use the
          # pgvector-published image so `CREATE EXTENSION vector` works.
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: archivist
            - name: POSTGRES_USER
              value: archivist
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archivist-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        # Uses your default StorageClass (e.g. Longhorn)
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: archivist
spec:
  selector:
    app: archivist-postgres
  ports:
    - port: 5432
  clusterIP: None

---
# The bot itself
apiVersion: apps/v1
kind: Deployment
metadata:
  name: archivist
  namespace: archivist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: archivist
  template:
    metadata:
      labels:
        app: archivist
    spec:
      containers:
        - name: archivist
          image: archivist:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: archivist-secrets
                  key: DISCORD_TOKEN
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: archivist-secrets
                  key: GEMINI_API_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archivist-secrets
                  key: DB_PASSWORD
            - name: DB_HOST
              value: "postgres.archivist.svc.cluster.local"
          volumeMounts:
            - name: snapshots
              mountPath: /app/snapshots
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"  # Playwright needs some headroom
              cpu: "1000m"
      volumes:
        - name: snapshots
          persistentVolumeClaim:
            claimName: archivist-snapshots-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: archivist-snapshots-pvc
  namespace: archivist
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
