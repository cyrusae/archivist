# Archivist Discord Bot - Configuration

discord:
  token: "YOUR_DISCORD_BOT_TOKEN"
  watched_channels: []
  # Snowflake ID of the Discord user who receives daily digests and is the only
  # user authorized to use `!search`. Leave blank to disable both features.
  owner_id: ""
  digest_time: "08:00" # HH:MM, interpreted in `timezone` below
  # IANA timezone name (e.g. "America/New_York"). Omit / blank = UTC.
  timezone: ""

# Default behavior (can be overridden per-message with flags)
defaults:
  summary: true
  tags: true
  archive: true

# Per-author rate limits. The owner (discord.owner_id) is exempt.
# Limits count one event per *message*, not per URL.
rate_limit:
  per_minute: 5
  per_hour: 30

# Google Gemini API
gemini:
  api_key: "YOUR_GEMINI_API_KEY"
  model: "gemini-2.0-flash"
  max_tokens: 1024
  
  # Pass 1: Classification & Tagging
  tag_system_prompt: |
    You are a professional librarian and archivist. Analyze the provided content.
    1. Determine the **Genre** (Fiction, Personal Essay, Technical Article, News, Social Media, Academic, etc.)
    2. Select 2-5 relevant **Tags** from the provided pool.
    3. Suggest 1-3 **New Tags** if the pool is insufficient.
    4. Extract key **Metadata** (Author, Publication, Date if visible).
    
    Respond ONLY with a JSON object: 
    {
      "genre": "...", 
      "tags": ["..."], 
      "new_tags": ["..."], 
      "metadata": {"author": "...", "publication": "...", "date": "..."}
    }

  # Pass 2: Context-Aware Summarization
  # The actual prompt will be constructed in code based on the Genre.
  summary_system_prompt: |
    You are a concise research librarian. Provide a brief gloss (one-line subject description) 
    and a 2-3 sentence summary.
    
    GUIDELINES BY GENRE:
    - FICTION: Avoid spoilers. Focus on 'vibe', themes, and setting. (e.g., "A haunting gothic horror about...")
    - PERSONAL ESSAY: Focus on the 'aboutness' and the author's central reflection/theme.
    - TECHNICAL: Focus on the core thesis, data, or technical contribution.
    - SOCIAL MEDIA: Be extremely brief. Focus on the main point or event mentioned.
    
    Respond in this exact format:
    **Gloss:** [one-line subject description]
    **Summary:** [2-3 sentence summary]

  # OCR / Alt-Text Prompt
  image_system_prompt: |
    You are an accessibility expert. Describe the provided image for a blind or low-vision user.
    - If it is a screenshot of a UI (like Discord or a browser), ignore the surrounding 'cruft' (sidebars, inputs) 
      and focus on the central content (messages, article text).
    - Provide a clean transcription of any text found in the image.
    - For photographs or art, describe the subject, style, and tone concisely.
    
    Format your response as:
    **Alt Text:** [Concise description for screen readers]
    **Transcription:** [Full text if applicable, otherwise omit]

# Archival & Snapshots
archive:
  timeout: 30
  services:
    - archive_is
    - wayback
  # Snapshot settings (Placeholder for Playwright integration)
  snapshots:
    enabled: true
    format: "pdf" # Use PDF for text layer preservation

# PostgreSQL connection
database:
  host: "localhost"
  port: 5432
  database: "archivist"
  user: "archivist"
  password: "YOUR_DB_PASSWORD"

# Per-server and per-channel overrides.
# Hierarchy: defaults < server < role < channel (channel wins).
#
# Role override with `ignore: true` makes Archivist completely invisible to
# that user — no archiving, no reactions. Example:
#
#   overrides:
#     servers:
#       "123456789012345678":          # guild snowflake
#         roles:
#           "987654321098765432":      # "Archivist-ignore" role snowflake
#             ignore: true
#           "111222333444555666":      # power-user role: always archive, skip summary
#             summary: false
#             archive: true
#     channels:
#       "555666777888999000":          # never tag anything in this channel
#         tags: false
#
# Note: role overrides require the Server Members privileged intent to be
# enabled in the Discord Developer Portal (Bot → Privileged Gateway Intents).
overrides: {}

